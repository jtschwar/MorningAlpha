# .github/workflows/daily-data.yml
name: Daily Data
on:
  schedule:
    - cron: "0 13 * * 1-5"   # weekdays 6am PT approx
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -U uv && uv pip install -r requirements.txt
      - run: python -m pipeline.jobs.daily_build --out-dir data/latest --history-dir data/history
      - name: Commit artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest data/history
          git commit -m "chore(data): daily refresh" || echo "No changes"
          git push
