name: Daily Data Build

on:
  schedule:
    # 6:15am PT weekdays (14:15 UTC)
    - cron: '15 14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run spread pipeline (all windows)
        run: alpha spread --output-dir data/latest
        env:
          # No Alpha Vantage key needed for spread (uses yfinance)
          PYTHONUNBUFFERED: '1'

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push
