name: Monthly Fundamentals Update

on:
  schedule:
    # First Monday of every month at 5:00pm ET after market close (22:00 UTC)
    - cron: '0 22 1 * *'  # 1st of every month at 22:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -e .

      - name: Fetch fundamentals for full universe
        run: alpha fundamentals --universe nasdaq --universe nyse --universe sp500 --out data/latest/fundamentals.csv
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit fundamentals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest/fundamentals.csv
          git diff --staged --quiet || git commit -m "chore: weekly fundamentals update $(date -u +%Y-%m-%d)"
          git push
