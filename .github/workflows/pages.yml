name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: morningalpha/web/package-lock.json

      - name: Install dependencies
        run: cd morningalpha/web && npm ci

      - name: Run tests
        run: cd morningalpha/web && npm test

      - name: Build
        run: cd morningalpha/web && npm run build

      - name: Copy data files into dist
        run: |
          mkdir -p morningalpha/web/dist/data/latest
          if [ -d data/latest ]; then
            cp data/latest/*.csv morningalpha/web/dist/data/latest/ 2>/dev/null || true
            cp data/latest/_generated.json morningalpha/web/dist/data/latest/ 2>/dev/null || true
            cp data/latest/ticker_index.json morningalpha/web/dist/data/latest/ 2>/dev/null || true
            cp data/latest/forecast_calibration_*.json morningalpha/web/dist/data/latest/ 2>/dev/null || true
            cp data/latest/forecast_paths_*.json morningalpha/web/dist/data/latest/ 2>/dev/null || true
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: morningalpha/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
